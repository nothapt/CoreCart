server {
    listen 80;
    server_name localhost;
    root /var/www/corecart;
    index index.php;

    # Serve static files directly, route everything else to index.php
    location / {
        try_files $uri $uri/ /index.php?route=$uri&$args;
    }

    # Pass PHP files to the php-fpm container
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Deny access to sensitive files and directories
    location ~ /\.(env|htaccess|git|github) {
        deny all;
    }

    # Deny access to install directory, CLI scripts, storage internals
    location ~ ^/(install|cli\.php|composer\.(json|lock)) {
        deny all;
    }

    location ~ ^/storage/(logs|cache|installed\.lock) {
        deny all;
    }

    # Deny access to Docker and CI files
    location ~ ^/(docker|\.github) {
        deny all;
    }
}
