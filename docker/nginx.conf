server {
    listen 80;
    server_name localhost;
    root /var/www/corecart;
    index index.php;

    # Redirect /admin to login
    location = /admin {
        return 302 /admin/auth/login;
    }

    # Serve static files directly, route everything else to entry points
    location / {
        try_files $uri $uri/ /index.php?route=$uri&$args;
    }

    # Only allow the two entry points
    location ~ ^/(index\.php|admin/index\.php)$ {
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Block all other .php files
    location ~ \.php$ {
        return 404;
    }

    # Deny access to sensitive files and directories
    location ~ /\.(env|htaccess|git|github) {
        deny all;
    }

    location ~ ^/(install|cli\.php|composer\.(json|lock)) {
        deny all;
    }

    location ~ ^/storage/(logs|cache|installed\.lock) {
        deny all;
    }

    location ~ ^/(docker|\.github) {
        deny all;
    }
}
