server {
    listen 80;
    server_name localhost;
    root /var/www/corecart;
    index index.php;

    # Serve static files directly, route everything else to index.php
    # Uses $uri path only (no query string) to set the route parameter
    location / {
        try_files $uri $uri/ /index.php?$uri;
    }

    # Pass PHP files to the php-fpm container
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Pass the original URI as route parameter
        fastcgi_param REQUEST_URI $request_uri;
    }

    # Deny access to sensitive files
    location ~ /\.(env|htaccess) {
        deny all;
    }
}
