services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/corecart:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_started
    networks:
      - corecart

  php:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../:/var/www/corecart
    working_dir: /var/www/corecart
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=corecart
      - DB_USER=root
      - DB_PASS=${DB_ROOT_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - corecart

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: corecart
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - corecart

networks:
  corecart:

volumes:
  db_data:
