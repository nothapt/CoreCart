name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_mysql, mbstring, intl, bcmath
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: locked

      - name: Validate Composer configuration
        run: composer validate --strict

      - name: Check PHP syntax
        shell: bash
        run: |
          set -euo pipefail
          find \
            account \
            admin \
            cart \
            catalog \
            checkout \
            install \
            system \
            -type f -name '*.php' -print0 \
            | xargs -0 -n1 php -l

      - name: Static analysis
        run: vendor/bin/phpstan analyse --no-progress --error-format=github

  tests:
    name: PHP ${{ matrix.php }} / MySQL
    needs: quality
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.4"
          - "8.5"

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: corecart_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      APP_ENV: testing
      APP_DEBUG: "true"
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: corecart_test
      DB_USER: root
      DB_PASS: root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, mbstring, intl, bcmath
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: locked

      - name: Run test suite
        run: vendor/bin/phpunit -c phpunit.xml --coverage-text

  smoke:
    name: Application smoke test
    needs: tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: corecart_smoke
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      APP_ENV: testing
      APP_DEBUG: "true"
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: corecart_smoke
      DB_USER: root
      DB_PASS: root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_mysql, mbstring, intl, bcmath
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: locked

      - name: Install database schema
        run: |
          mysql \
            --host=127.0.0.1 \
            --port=3306 \
            --user=root \
            --password=root \
            corecart_smoke < install/database.sql

      - name: Verify database schema
        run: |
          mysql \
            --host=127.0.0.1 \
            --port=3306 \
            --user=root \
            --password=root \
            --database=corecart_smoke \
            --execute="
              SHOW TABLES;
              SELECT COUNT(*) AS product_count FROM cc_product;
              SELECT COUNT(*) AS order_count FROM cc_order;
            "

      - name: Start application
        run: |
          mkdir -p storage/cache storage/logs
          php -S 127.0.0.1:8080 system/engine/router_builtin.php \
            > storage/logs/ci-server.log 2>&1 &
          echo $! > /tmp/corecart-server.pid

      - name: Wait for server
        run: |
          for attempt in {1..30}; do
            if curl --fail-with-body --show-error http://127.0.0.1:8080/health/live; then
              echo "Server is up"
              exit 0
            fi
            sleep 1
          done

          cat storage/logs/ci-server.log
          exit 1

      - name: Check health endpoints
        run: |
          set -euo pipefail

          echo "Checking liveness..."
          curl --fail-with-body --show-error \
            http://127.0.0.1:8080/health/live

          echo
          echo "Checking readiness..."
          if ! curl --fail-with-body --show-error \
            http://127.0.0.1:8080/health/ready; then
            echo
            echo "=== Application log ==="
            cat storage/logs/ci-server.log
            exit 1
          fi

      - name: Test catalog routes
        run: |
          curl --fail-with-body --show-error http://127.0.0.1:8080/
          curl --fail-with-body --show-error http://127.0.0.1:8080/catalog/product
          curl --fail-with-body --show-error http://127.0.0.1:8080/catalog/category
          curl --fail-with-body --show-error http://127.0.0.1:8080/cart/count

      - name: Stop server
        if: always()
        run: |
          kill $(cat /tmp/corecart-server.pid) 2>/dev/null || true
